name: Tetra Tech
description: >-
  Tetra Tech is an American consulting and engineering services firm headquartered
  in Pasadena, California. Founded in 1966, it provides consulting, engineering,
  program management, and construction management services across water, environment,
  infrastructure, resource management, energy, and international development.
  With 30,000 employees across 550 offices worldwide, Tetra Tech delivers
  data-driven digital solutions under the Tetra Tech Delta brand, encompassing
  advanced data analytics, artificial intelligence, process automation, and cloud
  integration. Key digital offerings include the Cosmos mobile data collection
  platform, WaterNet SaaS for water network management, and environmental data
  management tools. The company's GitHub organization (tetratech) hosts open-source
  environmental and water quality analysis tools.
url: https://www.tetratech.com/
tags:
  - Analytics
  - Consulting
  - Data Management
  - Engineering
  - Environment
  - Infrastructure
  - Water
created: '2026-05-03'
modified: '2026-05-03'
apis:
  - name: Cosmos Mobile Data Platform API
    description: >-
      Cosmos is Tetra Tech's mobile data collection platform designed for field data
      capture, project management, and reporting. The Cosmos API and webhook system
      enables integration with third-party enterprise systems, allowing automated
      data synchronization, webhook event notifications, and data export in industry
      standard formats including JSON and CSV.
    image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanURL: https://cosmos.tetratech.com/
    baseURL: https://cosmos.tetratech.com/
    tags:
      - Data Collection
      - Field Data
      - Mobile
      - Webhooks
    properties:
      - type: Documentation
        url: https://cosmos.tetratech.com/
      - type: Website
        url: https://cosmos.tetratech.com/

  - name: Tetra Tech Data Discovery Tool API
    description: >-
      The Data Discovery Tool (DDT) is an open-source environmental data analysis
      platform developed by Tetra Tech in partnership with USEPA. It provides
      data query, analysis, and visualization capabilities for environmental monitoring
      datasets. The application is available on GitHub with R-based data processing
      APIs for water quality trend analysis.
    image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanURL: https://github.com/tetratech/DataDiscoveryTool
    baseURL: https://github.com/tetratech/DataDiscoveryTool
    tags:
      - Environmental
      - Open Source
      - USEPA
      - Water Quality
    properties:
      - type: Documentation
        url: https://github.com/tetratech/DataDiscoveryTool
      - type: GitHubOrg
        url: https://github.com/tetratech

  - name: baytrends Water Quality Trend API
    description: >-
      baytrends is an open-source R package developed by Tetra Tech for evaluating
      long-term trends in Chesapeake Bay and similar water bodies using Generalized
      Additive Modeling (GAM). The package exposes functions as a programmatic API
      for water quality data ingestion, trend analysis, and visualization.
    image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanURL: https://github.com/tetratech/baytrends
    baseURL: https://github.com/tetratech/baytrends
    tags:
      - Chesapeake Bay
      - Environmental
      - Open Source
      - R Package
      - Water Quality
    properties:
      - type: Documentation
        url: https://github.com/tetratech/baytrends
      - type: GitHubOrg
        url: https://github.com/tetratech

  - name: Tetra Tech Delta Data Management Services
    description: >-
      The Tetra Tech Delta digital solutions portfolio delivers enterprise data
      management and analytics capabilities for industrial clients. Services include
      historian development, automated reporting, enterprise data integration,
      SCADA/OT system integration, and AI-powered analytics through cloud and
      on-premise deployments.
    image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanURL: https://www.tetratech.com/tetra-tech-delta/
    baseURL: https://www.tetratech.com/
    tags:
      - Analytics
      - Data Management
      - Digital Transformation
      - Enterprise
    properties:
      - type: Documentation
        url: https://www.tetratech.com/tetra-tech-delta/
      - type: Website
        url: https://www.tetratech.com/solutions/digital-systems/

  - name: WaterNet Water Network Management API
    description: >-
      WaterNet is Tetra Tech's SaaS water network management solution for utilities.
      It provides data-driven insights for water infrastructure management, enabling
      utilities to monitor network performance, analyze asset health, and support
      decision-making for capital planning and operations.
    image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanURL: https://www.tetratech.com/solutions/one-water/digital-water/
    baseURL: https://www.tetratech.com/
    tags:
      - SaaS
      - Water Infrastructure
      - Utilities
    properties:
      - type: Documentation
        url: https://www.tetratech.com/solutions/one-water/digital-water/
      - type: Website
        url: https://www.tetratech.com/solutions/one-water/digital-water/

